<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Visual Explainer Snapshots</title>
  <!-- Clarity tracking code for https://marvinbfreedman.github.io/schur-trace-certificate-visualizer/ -->
  <script>
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i+"?ref=bwt";
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xes7ogrgo9");
  </script>
  <style>
    :root {
      --bg: #f3f5f8;
      --panel: #ffffff;
      --ink: #20242c;
      --muted: #667085;
      --line: #d9dee7;
      --blue: #2869d8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button,
    select,
    a.button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      text-decoration: none;
    }

    button,
    a.button {
      padding: 0 12px;
      cursor: pointer;
    }

    select {
      min-width: 260px;
      padding: 0 28px 0 10px;
    }

    button.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    main {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
    }

    aside {
      min-height: calc(100vh - 90px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .snapshot-list {
      display: grid;
      gap: 1px;
      background: var(--line);
    }

    .snapshot-item {
      padding: 12px;
      border: 0;
      border-radius: 0;
      background: var(--panel);
      text-align: left;
      cursor: pointer;
    }

    .snapshot-item.active {
      border-left: 4px solid var(--blue);
      padding-left: 8px;
      background: #f7faff;
    }

    .snapshot-label {
      font-weight: 700;
      font-size: 13px;
    }

    .snapshot-meta {
      margin-top: 4px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      line-height: 1.35;
    }

    .stage {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 104px);
      border: 0;
      background: #fff;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      header {
        grid-template-columns: 1fr;
      }

      main {
        grid-template-columns: 1fr;
      }

      aside {
        min-height: 0;
      }

      iframe {
        height: 70vh;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Visual Explainer Snapshots</h1>
      <div id="summary" class="sub">Loading snapshots...</div>
    </div>
    <div class="controls">
      <button id="prev" type="button" aria-label="Previous snapshot">Prev</button>
      <select id="snapshotSelect" aria-label="Choose snapshot"></select>
      <button id="next" type="button" aria-label="Next snapshot">Next</button>
      <a id="openSnapshot" class="button primary" target="_blank" rel="noreferrer">Open</a>
    </div>
  </header>
  <main>
    <aside>
      <div id="snapshotList" class="snapshot-list"></div>
    </aside>
    <section class="stage">
      <iframe id="viewer" title="Snapshot viewer"></iframe>
    </section>
  </main>

  <script>
    const manifestUrl = "visual_snapshots/manifest.json";
    let snapshots = [];
    let active = 0;

    function labelFor(snapshot, index) {
      return `${index + 1}. ${snapshot.label || snapshot.id}`;
    }

    function renderList() {
      const list = document.getElementById("snapshotList");
      const select = document.getElementById("snapshotSelect");
      list.innerHTML = "";
      select.innerHTML = "";

      snapshots.forEach((snapshot, index) => {
        const item = document.createElement("button");
        item.type = "button";
        item.className = `snapshot-item${index === active ? " active" : ""}`;
        item.innerHTML = `
          <div class="snapshot-label">${labelFor(snapshot, index)}</div>
          <div class="snapshot-meta">${snapshot.id}<br>${snapshot.createdAt || ""}</div>
        `;
        item.addEventListener("click", () => setActive(index));
        list.appendChild(item);

        const option = document.createElement("option");
        option.value = String(index);
        option.textContent = labelFor(snapshot, index);
        select.appendChild(option);
      });
      select.value = String(active);
    }

    function setActive(index) {
      if (!snapshots.length) return;
      active = Math.max(0, Math.min(index, snapshots.length - 1));
      const snapshot = snapshots[active];
      const url = `visual_snapshots/${snapshot.entry}`;
      document.getElementById("viewer").src = url;
      document.getElementById("openSnapshot").href = url;
      document.getElementById("summary").textContent =
        `${snapshots.length} snapshot${snapshots.length === 1 ? "" : "s"} archived. Showing ${snapshot.id}.`;
      document.getElementById("prev").disabled = active === 0;
      document.getElementById("next").disabled = active === snapshots.length - 1;
      renderList();
    }

    document.getElementById("prev").addEventListener("click", () => setActive(active - 1));
    document.getElementById("next").addEventListener("click", () => setActive(active + 1));
    document.getElementById("snapshotSelect").addEventListener("change", event => {
      setActive(Number(event.target.value));
    });

    fetch(manifestUrl)
      .then(response => {
        if (!response.ok) throw new Error(`${manifestUrl} HTTP ${response.status}`);
        return response.json();
      })
      .then(manifest => {
        snapshots = [...(manifest.snapshots || [])].sort((a, b) => {
          return String(a.createdAt || a.id).localeCompare(String(b.createdAt || b.id));
        });
        if (!snapshots.length) {
          document.getElementById("summary").textContent = "No snapshots yet.";
          document.getElementById("snapshotList").innerHTML =
            `<div class="empty">Run snapshot_visual_explainer.py to create the first snapshot.</div>`;
          return;
        }
        setActive(snapshots.length - 1);
      })
      .catch(error => {
        document.getElementById("summary").textContent = "Snapshot manifest not found.";
        document.getElementById("snapshotList").innerHTML =
          `<div class="empty">${error.message}</div>`;
      });
  </script>
</body>
</html>
