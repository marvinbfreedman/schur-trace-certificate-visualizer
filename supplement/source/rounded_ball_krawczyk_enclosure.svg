<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Rounded-ball finite interval enclosure used by the Krawczyk step</title>
  <desc id="desc">A finite interval enclosure diagram showing a rounded perturbation ball, Krawczyk image, contraction margin, and chart-capacity boundary.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfcff"/>
      <stop offset="1" stop-color="#eef4f8"/>
    </linearGradient>
    <linearGradient id="ball" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cfe4ff" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#e8f5ef" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="kraw" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2869d8"/>
      <stop offset="1" stop-color="#13795b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 H 0 V 28" fill="none" stroke="#d7dce3" stroke-width="0.7" opacity="0.62"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#101828" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1120" height="360" rx="18" fill="url(#bg)"/>
  <rect x="22" y="22" width="1076" height="316" rx="16" fill="#fff" stroke="#d7dce3"/>
  <rect x="44" y="54" width="582" height="248" rx="10" fill="url(#grid)" stroke="#d7dce3"/>

  <g transform="translate(335 178)">
    <ellipse rx="220" ry="92" fill="#f8fafc" stroke="#b7c0ce" stroke-width="2" stroke-dasharray="8 8"/>
    <text x="-214" y="-110" fill="#475467" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">chart capacity boundary</text>

    <ellipse rx="151" ry="62" fill="url(#ball)" stroke="#2869d8" stroke-width="3" filter="url(#shadow)"/>
    <text x="-144" y="-72" fill="#1d4f9a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">rounded input ball B(c, rho)</text>

    <ellipse cx="22" cy="4" rx="82" ry="31" fill="#ffffff" stroke="#13795b" stroke-width="3"/>
    <text x="-54" y="10" fill="#13795b" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">K(B) subset B</text>

    <circle cx="0" cy="0" r="5.5" fill="#20242c"/>
    <text x="12" y="-10" fill="#20242c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">center c</text>

    <path d="M 0 0 C 42 -22, 84 -18, 104 -2" fill="none" stroke="url(#kraw)" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="56" y="-34" fill="#344054" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">Krawczyk map</text>

    <path d="M -151 0 H -220" stroke="#a66b00" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="-270" y="30" fill="#a66b00" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">margin</text>
  </g>

  <g transform="translate(674 58)">
    <text x="0" y="0" fill="#20242c" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="700">Finite interval/Krawczyk enclosure</text>
    <text x="0" y="31" fill="#667085" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="14">The finite row-flow certificate is accepted when the Krawczyk image remains inside the rounded interval ball.</text>

    <g transform="translate(0 62)">
      <rect x="0" y="0" width="388" height="44" rx="8" fill="#f8fafc" stroke="#d7dce3"/>
      <text x="16" y="27" fill="#20242c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">K(B) subset int(B)</text>
      <text x="238" y="27" fill="#13795b" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">closed</text>
    </g>

    <g transform="translate(0 122)">
      <rect x="0" y="0" width="388" height="44" rx="8" fill="#f8fafc" stroke="#d7dce3"/>
      <text x="16" y="27" fill="#20242c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">rho &lt; chart capacity</text>
      <text x="238" y="27" fill="#13795b" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">margin &gt; 0</text>
    </g>

    <g transform="translate(0 182)">
      <rect x="0" y="0" width="388" height="44" rx="8" fill="#f8fafc" stroke="#d7dce3"/>
      <text x="16" y="27" fill="#20242c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">Pluecker chart stays nonzero</text>
      <text x="287" y="27" fill="#2869d8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">rank</text>
    </g>

    <path d="M 404 84 C 438 104, 438 148, 404 169" fill="none" stroke="#344054" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="426" y="132" fill="#344054" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="14">endpoint map full row rank</text>
  </g>

  <g transform="translate(50 318)">
    <rect x="0" y="-20" width="10" height="10" rx="2" fill="#cfe4ff" stroke="#2869d8"/>
    <text x="18" y="-10" fill="#667085" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13">rounded input ball</text>
    <rect x="174" y="-20" width="10" height="10" rx="2" fill="#fff" stroke="#13795b" stroke-width="2"/>
    <text x="192" y="-10" fill="#667085" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13">Krawczyk image</text>
    <line x1="326" y1="-15" x2="356" y2="-15" stroke="#b7c0ce" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="364" y="-10" fill="#667085" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13">allowed chart capacity</text>
  </g>
</svg>
